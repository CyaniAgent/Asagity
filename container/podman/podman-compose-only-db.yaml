version: '4.0'

services:
  postgres:
    image: docker.io/library/postgres:18.3-alpine3.23
    container_name: asagity_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asagity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example_password}
      POSTGRES_DB: ${POSTGRES_DB:-asagity_db}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asagity} -d ${POSTGRES_DB:-asagity_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      app: asagity
      service: postgres

  redis:
    image: docker.io/library/redis:8.6.2-alpine
    container_name: asagity_redis
    command: >
      sh -c 'redis-server --appendonly yes $$([ -z "$$REDIS_PASSWORD" ] || echo "--requirepass $$REDIS_PASSWORD")'
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      app: asagity
      service: redis

volumes:
  postgres_data:
    name: asagity_postgres_data
  redis_data:
    name: asagity_redis_data