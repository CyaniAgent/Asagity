version: '3.8'

services:
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: asagity_database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asagity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example_password}
      POSTGRES_DB: ${POSTGRES_DB:-asagity_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8.6.2-alpine
    container_name: asagity_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
