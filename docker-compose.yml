version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: asagity_pg
    environment:
      POSTGRES_USER: asagity
      POSTGRES_PASSWORD: asagity_password
      POSTGRES_DB: asagity_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: asagity_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pg_data:
  redis_data: